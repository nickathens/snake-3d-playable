<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a1a; touch-action: none; }
canvas { display: block; width: 100%; height: 100%; }

#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; font-family: 'Segoe UI', Arial, sans-serif;
}

#score {
  position: absolute; top: 16px; left: 16px;
  color: #fff; font-size: 22px; font-weight: 700;
}

#highscore {
  position: absolute; top: 16px; right: 16px;
  color: #ccc; font-size: 14px;
}

#level-indicator {
  position: absolute; top: 42px; left: 16px;
  color: #aaa; font-size: 12px; letter-spacing: 2px;
  display: none;
}

#boost-bar {
  position: absolute; top: 60px; left: 16px;
  width: 120px; height: 8px;
  border: 1px solid #888;
  border-radius: 4px;
  overflow: hidden;
  display: none;
}
#boost-fill {
  width: 100%; height: 100%;
  background: #4a4;
  transition: width 0.1s;
  border-radius: 3px;
}
#boost-label {
  position: absolute; top: 48px; left: 16px;
  color: #aaa; font-size: 10px; letter-spacing: 2px;
  display: none;
}

#combo {
  position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
  color: #ff6600; font-size: 36px; font-weight: bold;
  letter-spacing: 4px;
  display: none;
  pointer-events: none;
}

#start-screen, #gameover-screen, #level-select-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: auto;
}

#start-screen { background: rgba(20,30,20,0.9); }
#gameover-screen { background: rgba(20,30,20,0.9); display: none; }
#level-select-screen { background: rgba(20,30,20,0.92); display: none; }

.title {
  font-size: 48px; color: #fff; letter-spacing: 6px; font-weight: 800;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px; color: #aaa; letter-spacing: 4px;
  margin-bottom: 40px;
}

.btn {
  background: #3a7a3a; border: none; color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600;
  padding: 12px 40px; cursor: pointer; letter-spacing: 3px;
  text-transform: uppercase; transition: all 0.2s;
  pointer-events: auto; margin: 6px 0;
  border-radius: 6px;
}
.btn:hover { background: #4a9a4a; }
.btn:disabled {
  background: #333; color: #666; cursor: default;
}
.btn:disabled:hover { background: #333; color: #666; }

#level-list {
  max-height: 55vh;
  overflow-y: auto;
  padding: 0 10px;
  scrollbar-width: thin;
  scrollbar-color: #4a4 #222;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#level-list::-webkit-scrollbar { width: 4px; }
#level-list::-webkit-scrollbar-track { background: #222; }
#level-list::-webkit-scrollbar-thumb { background: #4a4; border-radius: 2px; }

.level-btn {
  width: 280px; text-align: left; padding: 12px 16px;
  font-size: 13px; letter-spacing: 1px; position: relative;
}
.level-btn .level-name { display: block; margin-bottom: 3px; }
.level-btn .level-info { font-size: 9px; color: #aaa; letter-spacing: 1px; }
.level-btn .level-score { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 9px; color: #aaa; }
.level-btn:disabled .level-info { color: #555; }
.level-btn:disabled .level-score { color: #555; }
.level-btn .lock-icon { color: #c44; margin-right: 6px; }

.btn-back {
  margin-top: 16px; font-size: 14px; padding: 10px 30px;
  background: #555; color: #ddd;
}
.btn-back:hover { background: #777; }

.final-score {
  font-size: 28px; color: #e44; margin-bottom: 8px; font-weight: 700;
}

.final-highscore {
  font-size: 14px; color: #aaa; margin-bottom: 30px;
}

.level-unlock-msg {
  font-size: 14px; color: #fc0; margin-bottom: 20px; font-weight: 600;
  display: none;
}

#controls-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: #777; font-size: 11px; letter-spacing: 2px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">0</div>
  <div id="highscore"></div>
  <div id="level-indicator"></div>
  <div id="boost-label">BOOST [SHIFT]</div>
  <div id="boost-bar"><div id="boost-fill"></div></div>
  <div id="combo"></div>

  <div id="start-screen">
    <div class="title">SNAKE</div>
    <div class="subtitle">3D</div>
    <button class="btn" id="play-btn">PLAY</button>
  </div>

  <div id="level-select-screen">
    <div class="title" style="font-size: 28px; margin-bottom: 20px;">SELECT LEVEL</div>
    <div id="level-list"></div>
    <button class="btn btn-back" id="back-btn">BACK</button>
  </div>

  <div id="gameover-screen">
    <div class="final-score" id="final-score">0</div>
    <div class="final-highscore" id="final-highscore"></div>
    <div class="level-unlock-msg" id="level-unlock-msg"></div>
    <button class="btn" id="restart-btn" style="margin-bottom: 10px;">AGAIN</button>
    <button class="btn btn-back" id="levels-btn">LEVELS</button>
  </div>

  <div id="controls-hint">ARROWS / SWIPE</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
