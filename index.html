<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; touch-action: none; }
canvas { display: block; width: 100%; height: 100%; }

#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

#score {
  position: absolute; top: 16px; left: 16px;
  color: #fff; font-size: 28px; font-weight: 800;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: transform 0.1s;
}
#score.pop { transform: scale(1.3); }
#score.x2 { color: #FFD700; }

#highscore-display {
  position: absolute; top: 16px; right: 16px;
  color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600;
}

#level-indicator {
  position: absolute; top: 48px; left: 16px;
  color: rgba(255,255,255,0.35); font-size: 10px; letter-spacing: 2px; font-weight: 600;
  display: none;
}

#boost-bar {
  position: absolute; top: 64px; left: 16px;
  width: 100px; height: 5px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 3px; overflow: hidden; display: none;
}
#boost-fill {
  width: 100%; height: 100%;
  background: linear-gradient(90deg, #4CAF50, #8BC34A);
  transition: width 0.1s; border-radius: 2px;
}
#boost-label {
  position: absolute; top: 54px; left: 16px;
  color: rgba(255,255,255,0.25); font-size: 9px; letter-spacing: 2px; font-weight: 600;
  display: none;
}

#combo {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
  color: #FF6B35; font-size: 42px; font-weight: 900;
  letter-spacing: 3px; display: none; pointer-events: none;
  text-shadow: 0 3px 16px rgba(255,107,53,0.6);
}
@keyframes comboBounce {
  0% { transform: translate(-50%, -50%) scale(0.3); }
  50% { transform: translate(-50%, -50%) scale(1.2); }
  100% { transform: translate(-50%, -50%) scale(1); }
}
#combo.bounce { animation: comboBounce 0.3s ease-out; }

#timer {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  color: #E63946; font-size: 32px; font-weight: 900;
  display: none; pointer-events: none;
  text-shadow: 0 2px 10px rgba(230,57,70,0.5);
}

#warning {
  position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
  color: #E63946; font-size: 15px; font-weight: 700;
  letter-spacing: 4px; display: none; pointer-events: none;
}

#flash {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #fff; opacity: 0; pointer-events: none;
}

#slowmo-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(60,30,120,0.12); pointer-events: none; display: none;
}

.score-popup {
  position: absolute; color: #fff; font-size: 20px; font-weight: 800;
  text-shadow: 0 2px 6px rgba(0,0,0,0.5); pointer-events: none;
  transition: transform 0.6s ease-out, opacity 0.6s ease-out;
}
.score-popup.golden { color: #FFD700; font-size: 26px; text-shadow: 0 2px 12px rgba(255,215,0,0.6); }

@keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

/* Power-up indicator */
#powerup-indicator {
  position: absolute; top: 50px; right: 16px;
  background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 8px;
  text-align: center; display: none;
}
#powerup-name {
  color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 2px;
}
#powerup-bar {
  width: 70px; height: 3px; background: rgba(255,255,255,0.15);
  border-radius: 2px; margin-top: 3px;
}
#powerup-fill {
  height: 100%; width: 100%; border-radius: 2px;
  background: #4CAF50; transition: width 0.1s;
}

/* Stars HUD (in-game) */
#stars-hud {
  position: absolute; top: 78px; left: 16px;
  color: rgba(255,255,255,0.25); font-size: 11px; font-weight: 600;
  display: none; letter-spacing: 1px;
}

/* Screens */
#start-screen, #gameover-screen, #level-select-screen, #skin-select-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: auto;
}

#start-screen { background: rgba(8,8,16,0.93); }
#gameover-screen { background: rgba(8,8,16,0.93); display: none; }
#level-select-screen { background: rgba(8,8,16,0.95); display: none; }
#skin-select-screen { background: rgba(8,8,16,0.95); display: none; }

/* Pause overlay */
#pause-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(8,8,16,0.8); display: none;
  flex-direction: column; align-items: center; justify-content: center;
  pointer-events: auto; z-index: 10;
}
#pause-overlay .pause-title {
  font-size: 36px; color: #fff; font-weight: 900; letter-spacing: 6px; margin-bottom: 20px;
}
#pause-overlay .pause-hint {
  font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 3px;
}

.title {
  font-size: 52px; color: #fff; letter-spacing: 8px; font-weight: 900;
  margin-bottom: 2px; animation: bob 3s ease-in-out infinite;
}
.subtitle {
  font-size: 16px; color: rgba(255,255,255,0.25); letter-spacing: 8px;
  margin-bottom: 40px; font-weight: 600;
}

.btn {
  background: #4CAF50; border: none; color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 700;
  padding: 12px 44px; cursor: pointer; letter-spacing: 3px;
  text-transform: uppercase; border-radius: 8px;
  transition: all 0.12s; pointer-events: auto; margin: 4px 0;
  box-shadow: 0 4px 14px rgba(76,175,80,0.3);
}
.btn:hover { background: #5CBF60; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(76,175,80,0.4); }
.btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(76,175,80,0.2); }
.btn:disabled { background: #222; color: #444; cursor: default; box-shadow: none; }
.btn:disabled:hover { background: #222; color: #444; transform: none; box-shadow: none; }

/* Total stars in level select */
#total-stars-display {
  color: rgba(255,200,50,0.7); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; margin-bottom: 8px;
}

/* Skin selector in level select */
#skin-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
#skin-row .skin-arrow {
  background: rgba(255,255,255,0.08); border: none; color: rgba(255,255,255,0.4);
  font-size: 18px; font-weight: 700; cursor: pointer; padding: 4px 10px;
  border-radius: 6px; pointer-events: auto; font-family: inherit;
}
#skin-row .skin-arrow:hover { background: rgba(255,255,255,0.15); color: #fff; }
#skin-name-display {
  color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 2px;
  min-width: 100px; text-align: center;
}
#skin-preview {
  width: 16px; height: 16px; border-radius: 50%; display: inline-block;
  vertical-align: middle; margin-right: 6px; border: 1px solid rgba(255,255,255,0.2);
}
#skin-lock-info {
  color: rgba(255,255,255,0.2); font-size: 9px; letter-spacing: 1px;
  margin-top: 2px; height: 12px;
}

#level-list {
  max-height: 50vh; overflow-y: auto; padding: 0 10px;
  scrollbar-width: thin; scrollbar-color: #4CAF50 #111;
  display: flex; flex-direction: column; align-items: center;
}
#level-list::-webkit-scrollbar { width: 4px; }
#level-list::-webkit-scrollbar-track { background: #111; }
#level-list::-webkit-scrollbar-thumb { background: #4CAF50; border-radius: 2px; }

.phase-header {
  color: rgba(255,255,255,0.15); font-size: 9px; letter-spacing: 4px;
  font-weight: 700; margin: 12px 0 4px; text-align: center; width: 300px;
}
.phase-header:first-child { margin-top: 0; }

.level-btn {
  width: 300px; text-align: left; padding: 10px 16px;
  font-size: 13px; letter-spacing: 1px; position: relative;
  background: rgba(255,255,255,0.03);
}
.level-btn:hover:not(:disabled) { background: rgba(76,175,80,0.15); }
.level-btn .level-num { display: inline-block; width: 22px; color: rgba(255,255,255,0.2); font-size: 11px; font-weight: 700; }
.level-btn .level-name { font-weight: 700; }
.level-btn .level-info { display: block; font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 1px; margin-top: 2px; margin-left: 22px; }
.level-btn .level-score { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 10px; color: rgba(255,255,255,0.25); font-weight: 600; text-align: right; }
.level-btn .level-stars-display { color: rgba(255,200,50,0.6); font-size: 10px; letter-spacing: 1px; }
.level-btn:disabled .level-name { color: #555; }
.level-btn:disabled .level-info { color: rgba(255,255,255,0.1); }
.level-btn:disabled .level-score { color: rgba(255,255,255,0.1); }
.level-btn .lock-icon { color: #E63946; margin-right: 4px; font-size: 9px; }

.btn-back { margin-top: 14px; font-size: 13px; padding: 10px 30px; background: #2a2a2a; color: #888; box-shadow: none; }
.btn-back:hover { background: #333; color: #aaa; box-shadow: none; }

.final-label { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 5px; margin-bottom: 6px; font-weight: 700; }
.final-score { font-size: 60px; color: #fff; margin-bottom: 4px; font-weight: 900; }
.final-highscore { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 4px; font-weight: 600; }
.final-stars {
  font-size: 28px; color: rgba(255,200,50,0.7); margin-bottom: 20px;
  letter-spacing: 4px;
}
.level-unlock-msg { font-size: 14px; color: #FFD700; margin-bottom: 20px; font-weight: 700; letter-spacing: 2px; display: none; }
.skin-unlock-msg { font-size: 12px; color: #9966FF; margin-bottom: 12px; font-weight: 700; letter-spacing: 2px; display: none; }

.btn-arcade { background: #E63946; box-shadow: 0 4px 14px rgba(230,57,70,0.3); }
.btn-arcade:hover { background: #F04956; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(230,57,70,0.4); }

#arcade-hud {
  position: absolute; top: 32px; right: 16px;
  color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 600;
  letter-spacing: 2px; display: none; text-align: right; line-height: 1.6;
}

#level-complete-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(8,8,16,0.5); display: none;
  flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.lc-title { font-size: 36px; color: #FFD700; font-weight: 900; letter-spacing: 6px; }
.lc-score { font-size: 20px; color: rgba(255,255,255,0.5); margin-top: 10px; font-weight: 700; }
.lc-next { font-size: 13px; color: rgba(255,255,255,0.3); margin-top: 16px; letter-spacing: 4px; font-weight: 600; }

#arcade-clear-bar {
  position: absolute; top: 94px; left: 16px;
  width: 100px; height: 4px; background: rgba(255,255,255,0.1);
  border-radius: 2px; display: none; overflow: hidden;
}
#arcade-clear-fill {
  height: 100%; width: 0%; background: #FFD700; border-radius: 2px;
  transition: width 0.2s;
}
#arcade-clear-label {
  position: absolute; top: 84px; left: 16px;
  color: rgba(255,200,50,0.3); font-size: 9px; letter-spacing: 2px; font-weight: 600;
  display: none;
}

#controls-hint {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.15); font-size: 9px; letter-spacing: 3px; font-weight: 600;
}
#mobile-hint {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.25); font-size: 12px; letter-spacing: 2px; font-weight: 600;
  pointer-events: none; display: none;
  transition: opacity 1s ease-out;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">0</div>
  <div id="highscore-display"></div>
  <div id="level-indicator"></div>
  <div id="boost-label">BOOST</div>
  <div id="boost-bar"><div id="boost-fill"></div></div>
  <div id="combo"></div>
  <div id="timer"></div>
  <div id="warning"></div>
  <div id="flash"></div>
  <div id="slowmo-overlay"></div>
  <div id="score-popups" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;"></div>
  <div id="mobile-hint">TAP LEFT / RIGHT TO STEER</div>
  <div id="stars-hud"></div>
  <div id="arcade-hud"></div>
  <div id="arcade-clear-label">CLEAR</div>
  <div id="arcade-clear-bar"><div id="arcade-clear-fill"></div></div>

  <div id="level-complete-overlay">
    <div class="lc-title">LEVEL COMPLETE</div>
    <div class="lc-score" id="lc-score"></div>
    <div class="lc-next" id="lc-next"></div>
  </div>

  <div id="powerup-indicator">
    <div id="powerup-name"></div>
    <div id="powerup-bar"><div id="powerup-fill"></div></div>
  </div>

  <div id="start-screen">
    <div class="title">SNAKE</div>
    <div class="subtitle">3D</div>
    <button class="btn" id="play-btn">ADVENTURE</button>
    <button class="btn btn-arcade" id="arcade-btn">ARCADE RUN</button>
  </div>

  <div id="level-select-screen">
    <div class="title" style="font-size: 24px; letter-spacing: 5px; margin-bottom: 12px; animation: none;">SELECT LEVEL</div>
    <div id="total-stars-display"></div>
    <div id="skin-row">
      <button class="skin-arrow" id="skin-prev-btn">&lt;</button>
      <div>
        <div id="skin-name-display"><span id="skin-preview"></span><span id="skin-name-text">CLASSIC</span></div>
        <div id="skin-lock-info"></div>
      </div>
      <button class="skin-arrow" id="skin-next-btn">&gt;</button>
    </div>
    <div id="level-list"></div>
    <button class="btn btn-back" id="back-btn">BACK</button>
  </div>

  <div id="gameover-screen">
    <div class="final-label">SCORE</div>
    <div class="final-score" id="final-score">0</div>
    <div class="final-highscore" id="final-highscore"></div>
    <div class="final-stars" id="final-stars"></div>
    <div class="level-unlock-msg" id="level-unlock-msg"></div>
    <div class="skin-unlock-msg" id="skin-unlock-msg"></div>
    <div id="arcade-gameover-stats" style="font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:12px; letter-spacing:2px; display:none; font-weight:600;"></div>
    <button class="btn" id="restart-btn" style="margin-bottom: 6px;">AGAIN</button>
    <button class="btn btn-back" id="levels-btn">LEVELS</button>
  </div>

  <div id="pause-overlay">
    <div class="pause-title">PAUSED</div>
    <div class="pause-hint">TAP OR PRESS ANY KEY</div>
  </div>

  <div id="controls-hint">ARROWS / TAP</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "./three.module.min.js"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
