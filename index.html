<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake 3D</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; width: 100%; height: 100%; }

#ui {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; font-family: 'Courier New', monospace;
}

#score {
  position: absolute; top: 16px; left: 16px;
  color: #0f0; font-size: 20px; text-shadow: 0 0 10px #0f0;
}

#highscore {
  position: absolute; top: 16px; right: 16px;
  color: #0aa; font-size: 14px; text-shadow: 0 0 8px #0aa;
}

#start-screen, #gameover-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: auto;
}

#start-screen { background: rgba(0,0,0,0.85); }
#gameover-screen { background: rgba(0,0,0,0.85); display: none; }

.title {
  font-size: 48px; color: #0f0; letter-spacing: 8px;
  text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px; color: #0aa; letter-spacing: 4px;
  margin-bottom: 40px;
}

.btn {
  background: transparent; border: 1px solid #0f0; color: #0f0;
  font-family: 'Courier New', monospace; font-size: 18px;
  padding: 12px 40px; cursor: pointer; letter-spacing: 4px;
  text-transform: uppercase; transition: all 0.2s;
  pointer-events: auto;
}
.btn:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }

.final-score {
  font-size: 24px; color: #f44; margin-bottom: 8px;
  text-shadow: 0 0 15px #f44;
}

.final-highscore {
  font-size: 14px; color: #0aa; margin-bottom: 30px;
}

#controls-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  color: #555; font-size: 11px; letter-spacing: 2px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <div id="score">0</div>
  <div id="highscore"></div>

  <div id="start-screen">
    <div class="title">SNAKE</div>
    <div class="subtitle">3D</div>
    <button class="btn" id="play-btn">PLAY</button>
  </div>

  <div id="gameover-screen">
    <div class="final-score" id="final-score">0</div>
    <div class="final-highscore" id="final-highscore"></div>
    <button class="btn" id="restart-btn">AGAIN</button>
  </div>

  <div id="controls-hint">ARROWS / SWIPE</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
